# ISL Wiki application settings
# format: key=value

db_url=postgresql://127.0.0.1:5432/isl_wiki
md2html_bin=./examples/md2html/md2html

# Media storage and delivery
media_dir=./examples/webserver/runtime/docroot/public/wiki-files
media_base_url=/public/wiki-files
media_max_bytes=10485760

# Backup storage
backup_dir=/tmp/isl-wiki-backups
backup_keep_count=7
log_dir=/tmp/isl-wiki-logs

# Authentication
session_cookie_name=isl_wiki_session
session_days=7
