# Minimal Apache config fragment for ISL wiki CGI.
# ScriptAliasMatch allows /wiki, /wiki/<slug>, /wiki/<slug>/edit.

# Static media files (image/video/audio) served directly by Apache.
Alias /public/wiki-files/ "/Volumes/SD_ONE/work/dev/isl/examples/webserver/runtime/docroot/public/wiki-files/"

<Directory "/Volumes/SD_ONE/work/dev/isl/examples/webserver/runtime/docroot/public/wiki-files">
    Require all granted
</Directory>

# CGI for all /wiki paths.
ScriptAliasMatch ^/wiki(.*)$ "/Volumes/SD_ONE/work/dev/isl/examples/wiki/cgi-bin/wiki.cgi$1"

<Directory "/Volumes/SD_ONE/work/dev/isl/examples/wiki/cgi-bin">
    Options +ExecCGI
    AddHandler cgi-script .cgi
    Require all granted
</Directory>
